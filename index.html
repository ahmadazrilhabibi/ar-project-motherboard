<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Interaktif Full Gabungan</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- Gesture Support -->
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loading-text {
      font-family: sans-serif;
      text-align: center;
      color: white;
      font-size: 18px;
    }
  </style>

  <script>
    // Hilangkan loading saat kamera aktif
    window.addEventListener('camera-init', function () {
      document.getElementById('loading-screen').style.display = 'none';
    });

    // Gesture Handler Custom
    AFRAME.registerComponent('gesture-handler', {
      init: function () {
        this.isDragging = false;
        this.previousX = 0;
        this.previousY = 0;

        const el = this.el;

        // Tunggu canvas siap
        this.el.sceneEl.addEventListener('renderstart', () => {

          const canvas = this.el.sceneEl.canvas;

          // TOUCH START
          canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
              this.isDragging = true;
              this.previousX = e.touches[0].clientX;
              this.previousY = e.touches[0].clientY;
            }
          });

          // TOUCH END
          canvas.addEventListener('touchend', () => {
            this.isDragging = false;
            this.initialDistance = 0;
          });

          // DRAG ROTATE + MOVE
          canvas.addEventListener('touchmove', (e) => {

            // 1 JARI
            if (this.isDragging && e.touches.length === 1) {

              let deltaX = e.touches[0].clientX - this.previousX;
              let deltaY = e.touches[0].clientY - this.previousY;

              this.previousX = e.touches[0].clientX;
              this.previousY = e.touches[0].clientY;

              // Rotate kiri kanan
              let rotation = el.getAttribute('rotation');
              rotation.y += deltaX * 0.5;

              // Geser depan belakang
              let position = el.getAttribute('position');
              position.z += deltaY * 0.01;

              el.setAttribute('rotation', rotation);
              el.setAttribute('position', position);
            }

            // 2 JARI = PINCH ZOOM
            if (e.touches.length === 2) {

              let dx = e.touches[0].clientX - e.touches[1].clientX;
              let dy = e.touches[0].clientY - e.touches[1].clientY;

              let distance = Math.sqrt(dx * dx + dy * dy);

              if (!this.initialDistance) {
                this.initialDistance = distance;
              }

              let scaleFactor = distance / this.initialDistance;

              scaleFactor = Math.min(Math.max(scaleFactor, 0.3), 5);

              el.object3D.scale.set(
                scaleFactor,
                scaleFactor,
                scaleFactor
              );
            }

          });

        });
      }
    });
  </script>
</head>

<body>

  <!-- Loading Screen -->
  <div class="arjs-loader" id="loading-screen">
    <div class="loading-text">
      Mempersiapkan Modul AR...<br>
      Mohon tunggu sebentar.
    </div>
  </div>

  <!-- Scene -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    gesture-detector
    id="scene">

    <!-- Assets -->
    <a-assets>
      <a-asset-item id="model-router" src="router.glb"></a-asset-item>
      <a-asset-item id="model-switch" src="switch.glb"></a-asset-item>
    </a-assets>

    <!-- Marker Router -->
    <a-marker
      type="pattern"
      url="pattern-marker.patt"
      raycaster="objects: .clickable"
      emitevents="true"
      cursor="fuse: false; rayOrigin: mouse;"
      id="markerA">

      <a-entity
        gltf-model="#model-router"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        rotation="0 0 0"
        class="clickable"
        gesture-handler>
      </a-entity>

    </a-marker>

    <!-- Marker Switch -->
    <a-marker
      type="pattern"
      url="pattern-himanika.patt"
      raycaster="objects: .clickable"
      emitevents="true"
      cursor="fuse: false; rayOrigin: mouse;"
      id="markerB">

      <a-entity
        gltf-model="#model-switch"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        rotation="0 0 0"
        class="clickable"
        gesture-handler>
      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
