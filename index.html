<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- ARJS STABIL -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- GESTURE -->
  <script src="https://cdn.jsdelivr.net/gh/fcor/arjs-gestures/dist/gestures.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <!-- LOADER -->
  <div id="loading-screen" style="
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    text-align:center;
    font-family:sans-serif;
  ">
    Mempersiapkan Modul AR...<br>Mohon tunggu sebentar.
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    gesture-detector>

    <!-- ASSET -->
    <a-assets>
      <a-asset-item id="model-router" src="router.glb"></a-asset-item>
    </a-assets>

    <!-- MARKER -->
    <a-marker type="pattern" url="pattern-marker.patt">

      <a-entity
        gltf-model="#model-router"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        gesture-handler>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <!-- FIX LOADER (PAKAI TIMER + CAMERA CHECK) -->
  <script>
    // fallback kalau event gagal
    setTimeout(() => {
      document.getElementById("loading-screen").style.display = "none";
    }, 3000);

    // kalau kamera berhasil
    document.querySelector("a-scene").addEventListener("loaded", () => {
      document.getElementById("loading-screen").style.display = "none";
    });
  </script>

</body>
</html>
