<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

  <style>
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
  </style>

  <script>
    // ✅ FIX LOADER (anti stuck)
    window.addEventListener('arjs-video-loaded', function () {
      const loader = document.getElementById('loading-screen');
      if (loader) loader.style.display = 'none';
    });

    setTimeout(() => {
      const loader = document.getElementById('loading-screen');
      if (loader) loader.style.display = 'none';
    }, 4000);

    // ✅ ROTATE X + Y (atas bawah + kiri kanan)
    AFRAME.registerComponent('drag-rotate-xy', {
      init: function () {
        let isDragging = false;
        let previousX = 0;
        let previousY = 0;

        const el = this.el;
        const canvas = el.sceneEl.canvas;

        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            isDragging = true;
            previousX = e.touches[0].clientX;
            previousY = e.touches[0].clientY;
          }
        });

        canvas.addEventListener('touchend', () => {
          isDragging = false;
        });

        canvas.addEventListener('touchmove', (e) => {
          if (!isDragging || e.touches.length !== 1) return;

          let deltaX = e.touches[0].clientX - previousX;
          let deltaY = e.touches[0].clientY - previousY;

          previousX = e.touches[0].clientX;
          previousY = e.touches[0].clientY;

          // 🔥 ROTATE Y (lihat belakang)
          el.object3D.rotation.y += deltaX * 0.01;

          // 🔥 ROTATE X (atas bawah)
          el.object3D.rotation.x += deltaY * 0.01;

          // 🔒 batas biar gak kebalik
          el.object3D.rotation.x = Math.max(
            -Math.PI / 2,
            Math.min(Math.PI / 2, el.object3D.rotation.x)
          );
        });
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">

  <!-- LOADING -->
  <div class="arjs-loader" id="loading-screen">
    Mempersiapkan Modul AR...<br>Mohon tunggu sebentar.
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    gesture-detector>

    <a-assets>
      <a-asset-item id="model-router" src="router.glb"></a-asset-item>
      <a-asset-item id="model-switch" src="switch.glb"></a-asset-item>
    </a-assets>

    <!-- MARKER A -->
    <a-marker type="pattern" url="pattern-marker.patt">

      <a-entity
        gltf-model="#model-router"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        gesture-handler="rotationFactor:5"
        drag-rotate-xy>
      </a-entity>

    </a-marker>

    <!-- MARKER B -->
    <a-marker type="pattern" url="pattern-himanika.patt">

      <a-entity
        gltf-model="#model-switch"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        gesture-handler="rotationFactor:5"
        drag-rotate-xy>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
