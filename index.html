<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Interaktif</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- Gesture library -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <!-- Custom gesture -->
  <script>
AFRAME.registerComponent('drag-rotate', {
  init: function () {
    let isDragging = false;
    let previousX;

    this.el.sceneEl.canvas.addEventListener('touchstart', (e) => {
      isDragging = true;
      previousX = e.touches[0].clientX;
    });

    this.el.sceneEl.canvas.addEventListener('touchend', () => {
      isDragging = false;
    });

    this.el.sceneEl.canvas.addEventListener('touchmove', (e) => {
      if (!isDragging) return;

      let deltaX = e.touches[0].clientX - previousX;
      previousX = e.touches[0].clientX;

      let rotation = this.el.getAttribute('rotation');
      rotation.y += deltaX * 0.5;

      this.el.setAttribute('rotation', rotation);
    });
  }
});
</script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker type="pattern" url="marker.patt">

      <a-entity 
        gltf-model="model.glb"
        position="0 0 0"
        scale="0.3 0.3 0.3"
        rotation="0 0 0"
        drag-rotate
        pinch-scale
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
