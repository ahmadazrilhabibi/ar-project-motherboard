<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Interaktif Full</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('gesture-handler', {
      init: function () {
        this.isDragging = false;
        this.previousX = 0;
        this.previousY = 0;

        const el = this.el;
        const canvas = el.sceneEl.canvas;

        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            this.isDragging = true;
            this.previousX = e.touches[0].clientX;
            this.previousY = e.touches[0].clientY;
          }
        });

        canvas.addEventListener('touchend', () => {
          this.isDragging = false;
        });

        canvas.addEventListener('touchmove', (e) => {
          if (!this.isDragging || e.touches.length !== 1) return;

          let deltaX = e.touches[0].clientX - this.previousX;
          let deltaY = e.touches[0].clientY - this.previousY;

          this.previousX = e.touches[0].clientX;
          this.previousY = e.touches[0].clientY;

          // ROTATE (kiri kanan)
          let rotation = el.getAttribute('rotation');
          rotation.y += deltaX * 0.5;

          // ROTATE kiri kanan (Y)
let rotation = el.getAttribute('rotation');
rotation.y += deltaX * 0.5;

// ROTATE atas bawah (X)
rotation.x += deltaY * 0.5;

// BATASI biar gak kebalik ekstrem
rotation.x = Math.max(-90, Math.min(90, rotation.x));

el.setAttribute('rotation', rotation);
        });

        // PINCH ZOOM
        let initialDistance = 0;

        canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (!initialDistance) {
              initialDistance = distance;
            }

            let scaleFactor = distance / initialDistance;

            el.object3D.scale.set(
              scaleFactor,
              scaleFactor,
              scaleFactor
            );
          }
        });

        canvas.addEventListener('touchend', () => {
          initialDistance = 0;
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker type="pattern" url="marker.patt">

      <a-entity 
        gltf-model="model.glb"
        position="0 0 0"
        scale="0.3 0.3 0.3"
        rotation="0 0 0"
        gesture-handler>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
