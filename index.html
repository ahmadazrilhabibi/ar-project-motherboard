<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Interaktif</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- Gesture library -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <!-- Custom gesture -->
  <script>
    AFRAME.registerComponent('drag-rotate', {
      schema: { speed: { default: 1 } },

      init: function () {
        this.ifMouseDown = false;
        this.x_cord = 0;

        document.addEventListener('mousedown', (e) => {
          this.ifMouseDown = true;
          this.x_cord = e.clientX;
        });

        document.addEventListener('mouseup', () => {
          this.ifMouseDown = false;
        });

        document.addEventListener('mousemove', (e) => {
          if (!this.ifMouseDown) return;

          let change = e.clientX - this.x_cord;
          this.x_cord = e.clientX;

          let rotation = this.el.getAttribute('rotation');
          rotation.y += change * this.data.speed;

          this.el.setAttribute('rotation', rotation);
        });

        // Mobile touch
        document.addEventListener('touchstart', (e) => {
          this.ifMouseDown = true;
          this.x_cord = e.touches[0].clientX;
        });

        document.addEventListener('touchend', () => {
          this.ifMouseDown = false;
        });

        document.addEventListener('touchmove', (e) => {
          if (!this.ifMouseDown) return;

          let change = e.touches[0].clientX - this.x_cord;
          this.x_cord = e.touches[0].clientX;

          let rotation = this.el.getAttribute('rotation');
          rotation.y += change * this.data.speed;

          this.el.setAttribute('rotation', rotation);
        });
      }
    });

    // Zoom (pinch)
    AFRAME.registerComponent('pinch-scale', {
      init: function () {
        this.initialDistance = 0;
        this.scale = this.el.object3D.scale;

        document.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (!this.initialDistance) {
              this.initialDistance = distance;
            }

            let scaleFactor = distance / this.initialDistance;
            this.el.object3D.scale.set(
              scaleFactor,
              scaleFactor,
              scaleFactor
            );
          }
        });

        document.addEventListener('touchend', () => {
          this.initialDistance = 0;
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker type="pattern" url="marker.patt">

      <a-entity 
        gltf-model="model.glb"
        position="0 0 0"
        scale="0.3 0.3 0.3"
        rotation="0 0 0"
        drag-rotate
        pinch-scale
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
