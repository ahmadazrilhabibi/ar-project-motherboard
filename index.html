<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div class="arjs-loader" id="loading-screen">
      <div style="font-family: sans-serif; text-align: center; color: white; margin-top: 50vh; transform: translateY(-50%);">
        Mempersiapkan Modul AR...<br>Mohon tunggu sebentar.
      </div>
    </div>

    <style>
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    <script>
AFRAME.registerComponent('drag-move-x', {
  init: function () {
    let isDragging = false;
    let previousX = 0;

    const el = this.el;
    const canvas = el.sceneEl.canvas;

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        previousX = e.touches[0].clientX;
      }
    });

    canvas.addEventListener('touchend', () => {
      isDragging = false;
    });

    canvas.addEventListener('touchmove', (e) => {
      if (!isDragging || e.touches.length !== 1) return;

      let deltaX = e.touches[0].clientX - previousX;
      previousX = e.touches[0].clientX;

      let position = el.getAttribute('position');

      // 🔥 geser kiri kanan
      position.x += deltaX * 0.005;

      el.setAttribute('position', position);
    });
  }
});
</script>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
      gesture-detector
      id="scene">
      
      <a-assets>
        <a-asset-item id="model-router" src="router.glb"></a-asset-item>
        <a-asset-item id="model-switch" src="switch.glb"></a-asset-item>
      </a-assets>

      <a-marker
        type="pattern"
        url="pattern-marker.patt"
        raycaster="objects: .clickable"
        emitevents="true"
        cursor="fuse: false; rayOrigin: mouse;"
        id="markerA">
        
        <a-entity
  gltf-model="#model-router"
  scale="0.05 0.05 0.05"
  position="0 0 0"
  class="clickable"
  gesture-handler="rotationFactor:5"
  drag-move-x>
</a-entity>

      <a-marker
        type="pattern"
        url="pattern-himanika.patt"
        raycaster="objects: .clickable"
        emitevents="true"
        cursor="fuse: false; rayOrigin: mouse;"
        id="markerB">
        
        <a-entity
  gltf-model="#model-switch"
  scale="0.05 0.05 0.05"
  position="0 0 0"
  class="clickable"
  gesture-handler="rotationFactor:5"
  drag-move-x>
</a-entity>
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
