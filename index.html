<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Modul Interaktif</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- Gesture -->
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- LOADING -->
  <div class="arjs-loader" id="loading-screen">
    <div style="font-family: sans-serif; text-align: center; color: white;">
      Mempersiapkan Modul AR...<br>Mohon tunggu sebentar.
    </div>
  </div>

  <style>
    .arjs-loader {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>

  <script>
  // fallback: paksa hilang setelah 3 detik
  setTimeout(() => {
    const loader = document.getElementById('loading-screen');
    if (loader) loader.style.display = 'none';
  }, 3000);

  // kalau camera berhasil init
  window.addEventListener('arjs-video-loaded', function () {
    const loader = document.getElementById('loading-screen');
    if (loader) loader.style.display = 'none';
  });
</script>

  <!-- SCENE -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    gesture-detector
  >

    <!-- ASSETS -->
    <a-assets>
      <a-asset-item id="model-router" src="router.glb"></a-asset-item>
      <a-asset-item id="model-switch" src="switch.glb"></a-asset-item>
    </a-assets>

    <!-- MARKER A -->
    <a-marker
      type="pattern"
      url="pattern-marker.patt"
      raycaster="objects: .clickable"
      emitevents="true"
      cursor="rayOrigin: mouse"
    >

      <a-entity
        gltf-model="#model-router"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        class="clickable"

        gesture-handler="
          minScale: 0.01;
          maxScale: 2;
          rotationFactor: 5;
        "
      ></a-entity>

    </a-marker>

    <!-- MARKER B -->
    <a-marker
      type="pattern"
      url="pattern-himanika.patt"
      raycaster="objects: .clickable"
      emitevents="true"
      cursor="rayOrigin: mouse"
    >

      <a-entity
        gltf-model="#model-switch"
        scale="0.05 0.05 0.05"
        position="0 0 0"
        class="clickable"

        gesture-handler="
          minScale: 0.01;
          maxScale: 2;
          rotationFactor: 5;
        "
      ></a-entity>

    </a-marker>

    <!-- CAMERA -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
