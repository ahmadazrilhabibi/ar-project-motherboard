<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Interaktif Smooth</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('gesture-handler', {
      init: function () {
        let isDragging = false;
        let previousX = 0;
        let previousY = 0;

        const el = this.el;
        const canvas = el.sceneEl.canvas;

        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            isDragging = true;
            previousX = e.touches[0].clientX;
            previousY = e.touches[0].clientY;
          }
        });

        canvas.addEventListener('touchend', () => {
          isDragging = false;
        });

        canvas.addEventListener('touchmove', (e) => {
          if (!isDragging || e.touches.length !== 1) return;

          let deltaX = e.touches[0].clientX - previousX;
          let deltaY = e.touches[0].clientY - previousY;

          previousX = e.touches[0].clientX;
          previousY = e.touches[0].clientY;

          // ROTASI LANGSUNG KE OBJECT3D (LEBIH STABIL)
          el.object3D.rotation.y += deltaX * 0.01;
          el.object3D.rotation.x += deltaY * 0.01;

          // BATASI ROTASI ATAS BAWAH
          el.object3D.rotation.x = Math.max(
            -Math.PI / 2,
            Math.min(Math.PI / 2, el.object3D.rotation.x)
          );
        });

        // PINCH ZOOM
        let initialDistance = 0;
        let currentScale = 0.3;

        canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (!initialDistance) {
              initialDistance = distance;
            }

            let scaleFactor = distance / initialDistance;

            el.object3D.scale.set(
              currentScale * scaleFactor,
              currentScale * scaleFactor,
              currentScale * scaleFactor
            );
          }
        });

        canvas.addEventListener('touchend', () => {
          initialDistance = 0;
        });
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-marker type="pattern" url="marker.patt">

      <a-entity 
        gltf-model="model.glb"
        position="0 0 0"
        scale="0.3 0.3 0.3"
        gesture-handler>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
